steps:
  # 1. Build the Admin App Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-admin
    args:
      - 'build'
      - '-t'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
      - '-t'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:latest'
      - '-f'
      - 'apps/admin/Dockerfile'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push-admin
    args:
      - 'push'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
    waitFor: ['build-admin']

  # 3. Push the "latest" tag as well
  - name: 'gcr.io/cloud-builders/docker'
    id: push-admin-latest
    args:
      - 'push'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:latest'
    waitFor: ['push-admin']

  # Step 1: The Provider (Starts the Proxy)
  - name: 'gcr.io/cloud-builders/docker'
    id: start-proxy
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p /workspace/cloudsql
        chmod 777 /workspace/cloudsql
        docker run -d --name=cloud-sql-proxy --network=cloudbuild -v /workspace/cloudsql:/cloudsql gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.1 --unix-socket=/cloudsql drivepro-production:europe-west4:drivepro-db-main
    waitFor: ['push-admin-latest']

  # Step 2: The Consumer (Runs the Migration)
  - name: 'gcr.io/cloud-builders/npm'
    id: db-migrate
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Wait for the proxy to start and create the directory
        echo "Waiting for Cloud SQL proxy socket..."
        SOCKET_DIR="/workspace/cloudsql/drivepro-production:europe-west4:drivepro-db-main"
        for i in {1..20}; do
          if [ -S "$SOCKET_DIR/.s.PGSQL.5432" ]; then
            echo "Proxy socket found!"
            break
          fi
          sleep 1
        done
        
        if [ ! -S "$SOCKET_DIR/.s.PGSQL.5432" ]; then
          echo "ERROR: Cloud SQL proxy socket was not created! Proxy likely failed to authenticate."
          exit 1
        fi
        
        # Create a symlink to completely bypass Prisma's colon-parsing bug in the host parameter
        ln -s "$SOCKET_DIR" /workspace/cloudsql/mydb
        
        # URL encode credentials because DB_PASS contains special characters
        ENCODED_USER=$(node -e "console.log(encodeURIComponent(process.env.DB_USER))")
        ENCODED_PASS=$(node -e "console.log(encodeURIComponent(process.env.DB_PASS))")
        
        # Connect to Unix Socket with host parameter pointing to the directory
        export DATABASE_URL="postgresql://$${ENCODED_USER}:$${ENCODED_PASS}@localhost/postgres?host=/workspace/cloudsql/mydb"
        
        npm ci
        cd packages/database
        npx prisma migrate deploy
    secretEnv: ['DB_USER', 'DB_PASS']
    waitFor: ['start-proxy']

  # 5. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-admin
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'admin-app'
      - '--image'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
      - '--region'
      - 'europe-west4'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_DEFAULT_LOCALE=cs'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL_UNIX:latest' # Unix socket connection string in Secret Manager
      - '--add-cloudsql-instances'
      - 'drivepro-production:europe-west4:drivepro-db-main'
      - '--allow-unauthenticated'
    waitFor: ['db-migrate']

# Store Secrets in Secret Manager and map them here
availableSecrets:
  secretManager:
    - versionName: projects/drivepro-production/secrets/DB_USER/versions/latest
      env: 'DB_USER'
    - versionName: projects/drivepro-production/secrets/DB_PASS/versions/latest
      env: 'DB_PASS'

options:
  logging: CLOUD_LOGGING_ONLY
