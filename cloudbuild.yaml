steps:
  # 1. Build the Admin App Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-admin
    args:
      - 'build'
      - '-t'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
      - '-t'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:latest'
      - '-f'
      - 'apps/admin/Dockerfile'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push-admin
    args:
      - 'push'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
    waitFor: ['build-admin']

  # 3. Push the "latest" tag as well
  - name: 'gcr.io/cloud-builders/docker'
    id: push-admin-latest
    args:
      - 'push'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:latest'
    waitFor: ['push-admin']

  # 4a. Start the Cloud SQL Proxy
  - name: 'gcr.io/cloud-builders/docker'
    id: start-proxy
    args:
      - 'run'
      - '-d'
      - '--name=cloud-sql-proxy'
      - '-v'
      - 'cloudsql:/cloudsql'
      - 'gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.1'
      - '--unix-socket=/cloudsql'
      - 'drivepro-production:europe-west4:drivepro-db-main'
    waitFor: ['push-admin-latest']
    volumes:
      - name: 'cloudsql'
        path: '/cloudsql'

  # 4b. Run Prisma Migrations using Cloud SQL Auth Proxy
  - name: 'node:18'
    id: db-migrate
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Wait for Proxy to be ready
        sleep 2

        # Run Migration
        export DATABASE_URL="postgresql://$${DB_USER}:$${DB_PASS}@localhost/postgres?host=/cloudsql/drivepro-production:europe-west4:drivepro-db-main&connect_timeout=300"
        npm ci
        cd packages/database
        npx prisma migrate deploy
    secretEnv: ['DB_USER', 'DB_PASS']
    waitFor: ['start-proxy']
    volumes:
      - name: 'cloudsql'
        path: '/cloudsql'

  # 5. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-admin
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'admin-app'
      - '--image'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
      - '--region'
      - 'europe-west4'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_DEFAULT_LOCALE=cs'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL_UNIX:latest' # Unix socket connection string in Secret Manager
      - '--add-cloudsql-instances'
      - 'drivepro-production:europe-west4:drivepro-db-main'
      - '--allow-unauthenticated'
    waitFor: ['db-migrate']

# Store Secrets in Secret Manager and map them here
availableSecrets:
  secretManager:
    - versionName: projects/drivepro-production/secrets/DB_USER/versions/latest
      env: 'DB_USER'
    - versionName: projects/drivepro-production/secrets/DB_PASS/versions/latest
      env: 'DB_PASS'

options:
  logging: CLOUD_LOGGING_ONLY
