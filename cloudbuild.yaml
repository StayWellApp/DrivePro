steps:
  # 1. Build the Admin App Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-admin
    args:
      - 'build'
      - '-t'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
      - '-t'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:latest'
      - '-f'
      - 'apps/admin/Dockerfile'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push-admin
    args:
      - 'push'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
    waitFor: ['build-admin']

  # 3. Push the "latest" tag as well
  - name: 'gcr.io/cloud-builders/docker'
    id: push-admin-latest
    args:
      - 'push'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:latest'
    waitFor: ['push-admin']

  # Step 1: The Provider (Starts the Proxy)
  - name: 'gcr.io/cloud-builders/docker'
    id: start-proxy
    args: ['run', '-d', '--name=cloud-sql-proxy', '-v', '/workspace/cloudsql:/cloudsql', 'gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.1', '--unix-socket=/cloudsql', 'drivepro-production:europe-west4:drivepro-db-main']
    waitFor: ['push-admin-latest']

  # Step 2: The Consumer (Runs the Migration)
  - name: 'gcr.io/cloud-builders/npm'
    id: db-migrate
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Create a symlink to completely bypass Prisma's colon-parsing bug in the host parameter
        ln -s /workspace/cloudsql/drivepro-production:europe-west4:drivepro-db-main /workspace/cloudsql/mydb
        export DATABASE_URL="postgresql://$${DB_USER}:$${DB_PASS}@localhost/postgres?host=/workspace/cloudsql/mydb"
        # DEBUG: Add this echo so we can see the resolved URL in the logs!
        echo "Resolving to URL: $${DATABASE_URL}"
        npm ci
        cd packages/database
        npx prisma migrate deploy
    secretEnv: ['DB_USER', 'DB_PASS']
    waitFor: ['start-proxy']

  # 5. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-admin
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'admin-app'
      - '--image'
      - 'europe-west4-docker.pkg.dev/drivepro-production/drivepro-repo/admin:$COMMIT_SHA'
      - '--region'
      - 'europe-west4'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_DEFAULT_LOCALE=cs'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL_UNIX:latest' # Unix socket connection string in Secret Manager
      - '--add-cloudsql-instances'
      - 'drivepro-production:europe-west4:drivepro-db-main'
      - '--allow-unauthenticated'
    waitFor: ['db-migrate']

# Store Secrets in Secret Manager and map them here
availableSecrets:
  secretManager:
    - versionName: projects/drivepro-production/secrets/DB_USER/versions/latest
      env: 'DB_USER'
    - versionName: projects/drivepro-production/secrets/DB_PASS/versions/latest
      env: 'DB_PASS'

options:
  logging: CLOUD_LOGGING_ONLY
